<!DOCTYPE html>
<html lang="cs">
<head>
<link rel="icon" type="image/png" href="/bklogo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BK Compress – Images</title>

  <style>
    :root{
      --bg2:#020617;
      --bgPurple:#3a1f73;
      --bgPurple2:#5a2ea6;
      --bgPurple3:#24124a;
      --bgBlue:#2147a8;
      --bgBlue2:#38bdf8;
      --glass:rgba(15,23,42,.82);
      --border:rgba(255,255,255,.14);
      --text:#e5e7eb;
      --muted:#9aa4c0;
      --accent:#38bdf8;
      --accent2:#818cf8;
      --success:#86efac;
    }

    *{box-sizing:border-box;}
    html{scroll-behavior:smooth;}

    body{
      margin:0;
      font-family:system-ui, sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#050816,#020617);
      min-height:100vh;
      overflow-x:hidden;
      overflow-y:auto;
    }

    .section{width:100%;}

    .story{
      position:relative;
      height:260vh;
    }

    .story-sticky{
      position:sticky;
      top:0;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
      overflow:visible;
    }

    .hero{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      transition:opacity .15s linear, transform .15s linear;
      will-change:transform, opacity;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:-180px -220px;
      background:radial-gradient(1000px at 50% 55%, rgba(91, 40, 172, 0.700), transparent 60%);
      z-index:-1;
      pointer-events:none;
    }

    .hero-content{
      width:920px;
      max-width:94vw;
    }

    .hero-content h1{
      margin:0 0 22px;
      font-size:clamp(36px, 5.4vw, 64px);
      line-height:1.08;
      letter-spacing:-0.03em;
    }

    .hero-content p{
      margin:0 auto 14px;
      max-width:760px;
      font-size:clamp(18px, 1.9vw, 20px);
      line-height:1.7;
      color:var(--muted);
    }

    .hero-note{
      font-size:clamp(18px, 1.9vw, 20px) !important;
      line-height:1.7;
      color:var(--muted) !important;
      opacity:1;
    }

    .hero-second{
      opacity:0;
      transform:translateY(40px) scale(.98);
      pointer-events:none;
    }

    .hero-second::before{
      content:"";
      position:absolute;
      inset:-180px -220px;
      background:radial-gradient(1000px at 50% 55%, rgba(41, 150, 223, 0.700), transparent 60%);
      z-index:-1;
      pointer-events:none;
    }

    .hero-second h2{
      margin:0 0 22px;
      font-size:clamp(32px, 5.4vw, 64px);
      line-height:1.1;
      letter-spacing:-0.03em;
    }

    .compress-wrap{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      overflow:visible;
    }

    .app{
    position:relative;
    width:1100px;
    max-width:94vw;
    background:var(--glass);
    backdrop-filter:blur(18px);
    border:1px solid var(--border);
    border-radius:36px;
    padding:36px;
    box-shadow:0 40px 120px rgba(0,0,0,.6);
    opacity:0;
    transform:translateY(120px) scale(.96);
    transition:none;
    will-change:transform, opacity;
    pointer-events:none;
    }

    .results:empty,
    .selected-compression:empty{
      display:none;
    }

    .app::before{
      content:"";
      position:absolute;
      inset:-350px -220px;
      background:
        radial-gradient(900px at 45% 60%, rgba(91, 40, 172, 0.600), transparent 50%),
        radial-gradient(800px at 65% 50%, rgba(41, 150, 223, 0.500), transparent 50%);
      z-index:-1;
      pointer-events:none;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:42px;
      flex-wrap:wrap;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:15px;
      font-size:26px;
      font-weight:900;
    }

    .logo svg{
      width:34px;
      height:34px;
    }

    .images-badge{
      width:76px;
      height:52px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:20px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#020617;
    }

    .images-badge svg{
      width:46px;
      height:46px;
    }

    .drop{
      margin-top:24px;
      padding:56px 24px;
      border-radius:28px;
      border:2px dashed var(--border);
      text-align:center;
      cursor:pointer;
      transition:.25s;
      font-size:22px;
      font-weight:800;
      color:#ffffff;
      letter-spacing:0;
    }

    .drop:hover{
      border-color:var(--accent);
      transform:scale(1.01);
    }

    .drop.active{
      border-color:var(--accent);
      background:rgba(56,189,248,.08);
    }

    .controls{
      display:grid;
      grid-template-columns:1fr 1.2fr;
      gap:20px;
      margin-top:24px;
      align-items:stretch;
    }

    input[type="range"]{
      width:100%;
      appearance:none;
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.14);
      outline:none;
    }

    input[type="range"]::-webkit-slider-thumb{
      appearance:none;
      width:22px;
      height:22px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none;
      cursor:pointer;
    }

    input[type="range"]::-moz-range-thumb{
      width:22px;
      height:22px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none;
      cursor:pointer;
    }


    .compression-buttons{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:12px;
      width:100%;
    }

    .compress-level-btn{
      height:74px;
      border-radius:26px;
      border:1px solid rgba(255,255,255,.22);
      background:transparent;
      color:#ffffff;
      font-size:20px;
      font-weight:800;
      cursor:pointer;
      transition:.2s;
      padding:0 12px;
    }

    .compress-level-btn:hover{
      border-color:rgba(255,255,255,.4);
      background:rgba(255,255,255,.04);
    }

    .compress-level-btn.active{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#020617;
      border-color:transparent;
    }

    .compress-level-btn span{
      font-size:13px;
      line-height:1.5;
      color:var(--muted);
      font-weight:600;
    }

    .selected-compression{
      margin-top:10px;
      font-size:13px;
      line-height:1.5;
      color:var(--muted);
    }

    #compressBtn{
      height:74px;
      padding:0 32px;
      border-radius:26px;
      border:none;
      cursor:pointer;
      font-weight:900;
      font-size:20px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#020617;
      transition:.25s;
    }

    #compressBtn:hover{
      transform:translateY(-3px) scale(1.02);
    }

    #compressBtn:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
    }

    .status{
      margin-top:22px;
      min-height:24px;
      font-size:14px;
      color:var(--muted);
    }

    .results{
      margin-top:22px;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(170px, 1fr));
      gap:16px;
    }

    .result{
      border:1px solid rgba(255,255,255,.1);
      border-radius:22px;
      padding:12px;
      background:rgba(255,255,255,.03);
      overflow:hidden;
    }

    .result img{
      width:80px;
      height:50px;
      object-fit:cover;
      display:block;
      border-radius:8x;
      border:1px solid rgba(255,255,255,.08);
      margin-bottom:10px;
    }

    .result-name{
      font-size:12px;
      color:#fff;
      line-height:1.4;
      word-break:break-word;
      margin-bottom:4px;
    }

    .result-size{
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
    }

    .saved{
      color:var(--success);
      font-weight:700;
    }

    @media (max-width: 768px){
      .section{
        min-height:auto;
        padding:50px 16px;
      }

      .hero{
        min-height:80vh;
      }

      .app{
        padding:24px;
        border-radius:28px;
      }

      .drop{
        padding:50px 18px;
        font-size:16px;
      }

      .lock-icon{
        width:46px;
        height:46px;
        overflow:visible;
      }
      
      #lockShackleGroup{
        transform-box:view-box;
        transform-origin:12px 8px;
      }
      
      .controls{
        grid-template-columns:1fr;
      }

      button{
        height:74px;
        padding:0 32px;
        border-radius:26px;
        border:none;
        cursor:pointer;
        font-weight:900;
        font-size:20px;
        background:linear-gradient(135deg,var(--accent),var(--accent2));
        color:#020617;
        transition:.25s;
      }
    }
  </style>
</head>
<body>

<section class="section story" id="story">
  <div class="story-sticky">

    <div class="hero" id="hero">
      <div class="hero-content">
        <h1>Komprese obrázků jednoduše a zdarma s BK Compress</h1>
        <p>
          Nejrychlejší komprese obrázků - vložte obrázky, nastavte kvalitu a stáhněte ihned vše v jednom ZIP souboru.
        </p>
      </div>
    </div>

    <div class="hero hero-second" id="heroSecond">
      <div class="hero-content">
        <h2>Bezpečnost na prvním místě</h2>
        <p class="hero-note">Obrázky neopouštějí váš prohlížeč.</p>
      </div>
    </div>

    <div class="compress-wrap">
      <div class="app" id="app">
        <header>
          <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 4v10" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
              <path d="M8.5 10.5 12 14l3.5-3.5" stroke="var(--accent2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <rect x="5" y="17" width="14" height="2" rx="1" fill="url(#g1)"/>
              <defs>
                <linearGradient id="g1" x1="5" y1="18" x2="19" y2="18" gradientUnits="userSpaceOnUse">
                  <stop stop-color="var(--accent)"/>
                  <stop offset="1" stop-color="var(--accent2)"/>
                </linearGradient>
              </defs>
            </svg>
            BK Compress
          </div>

          <div class="images-badge" aria-label="Bezpečné">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" class="lock-icon">
              <g id="lockShackleGroup">
                <path
                  d="M8 10V8.6a4 4 0 0 1 8 0V10"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </g>
              <rect
                x="5"
                y="10"
                width="14"
                height="10"
                rx="3"
                stroke="currentColor"
                stroke-width="2"
              />
            </svg>
          </div>
          
        </header>

        <div class="drop" id="imgDrop">Klikněte nebo přetáhněte obrázky</div>
        <input type="file" id="imgInput" accept="image/*" multiple hidden>

        <div class="controls">
          <div class="compression-buttons">
            <button type="button" class="compress-level-btn" data-quality="0.75" data-label="~25%">Malá</button>
            <button type="button" class="compress-level-btn" data-quality="0.50" data-label="~50%">Střední</button>
            <button type="button" class="compress-level-btn" data-quality="0.25" data-label="~75%">Velká</button>
          </div>

          <button id="compressBtn">Komprimovat a stáhnout ZIP</button>
        </div>

        
        <div class="status" id="status"></div>
        <div class="results" id="results"></div>
        <div class="selected-compression" id="selectedCompression"></div>
      </div>
    </div>

  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
  const imgDrop = document.getElementById("imgDrop");
  const imgInput = document.getElementById("imgInput");
  const compressBtn = document.getElementById("compressBtn");
  const status = document.getElementById("status");
  const app = document.getElementById("app");
  const compressionButtons = document.querySelectorAll(".compress-level-btn");
  const results = document.getElementById("results");
  const hero = document.getElementById("hero");
  const heroSecond = document.getElementById("heroSecond");
  const story = document.getElementById("story");
  const selectedCompression = document.getElementById("selectedCompression");
  const lockShackleGroup = document.getElementById("lockShackleGroup");  
  imgDrop.style.pointerEvents = "none";
  compressBtn.style.pointerEvents = "none";
  
  let files = [];

  let selectedQuality = null;
  compressionButtons.forEach(button => {
    button.addEventListener("click", () => {
      selectedQuality = Number(button.dataset.quality);

      compressionButtons.forEach(btn => btn.classList.remove("active"));
      button.classList.add("active");

      selectedCompression.textContent = `Úroveň komprese: ${button.dataset.label}`;
    });
  });

    function formatKB(bytes){
      return `${Math.max(1, Math.round(bytes / 1024))} KB`;
    }

    function renderStatus(){
      if(files.length > 0){
        status.textContent = `Připraveno ke kompresi: ${files.length} obrázků`;
      } else {
        status.textContent = "";
      }
    }

  function renderPreviewCards(previewItems){
    results.innerHTML = "";

    previewItems.forEach(item => {
      const card = document.createElement("div");
      card.className = "result";
      card.innerHTML = `
        <img src="${item.src}" alt="${item.name}">
        <div class="result-name">${item.name}</div>
        <div class="result-size">${item.info}</div>
      `;
      results.appendChild(card);
    });
  }

  function showSelectedPreviews(){
    if(files.length === 0){
      results.innerHTML = "";
      return;
    }

    const previewItems = files.slice(0, 5).map(file => ({
      src: URL.createObjectURL(file),
      name: file.name,
      info: `Původní velikost: ${formatKB(file.size)}`
    }));

    renderPreviewCards(previewItems.slice(0, 5));
  }

  function setFiles(fileList){
    files = [...fileList].filter(file => file.type.startsWith("image/"));
    renderStatus();
    showSelectedPreviews();
  }

  function downloadBlob(blob, fileName){
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function compressImageFile(file, qualityRatio){
    return new Promise((resolve, reject) => {
      const img = new Image();
      const objectUrl = URL.createObjectURL(file);

      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = img.width;
        canvas.height = img.height;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);

        canvas.toBlob(blob => {
          URL.revokeObjectURL(objectUrl);

          if(!blob){
            reject(new Error(`Nepodařilo se zkomprimovat soubor ${file.name}`));
            return;
          }

          resolve(blob);
        }, "image/jpeg", qualityRatio);
      };

      img.onerror = () => {
        URL.revokeObjectURL(objectUrl);
        reject(new Error(`Nepodařilo se načíst soubor ${file.name}`));
      };

      img.src = objectUrl;
    });
  }

  function updateStoryScroll(){
    const rect = story.getBoundingClientRect();
    const maxScroll = story.offsetHeight - window.innerHeight;

    let progress = 0;
    if(maxScroll > 0){
      progress = Math.min(Math.max(-rect.top / maxScroll, 0), 1);
    }

    const heroOpacity = 1 - Math.min(progress * 2.2, 1);
    const heroY = progress * -80;
    const heroScale = 1 - progress * 0.08;

    hero.style.opacity = heroOpacity;
    hero.style.transform = `translateY(${heroY}px) scale(${heroScale})`;

    let secondProgress = Math.max((progress - 0.30) / 0.25, 0);
    if(secondProgress > 1) secondProgress = 1;
        
    let secondFadeOut = Math.max((progress - 0.84) / 0.10, 0);
    if(secondFadeOut > 1) secondFadeOut = 1;

    const secondOpacity = secondProgress * (1 - secondFadeOut);
    const secondY = 40 - secondProgress * 40 - secondFadeOut * 16;
    const secondScale = 0.98 + secondProgress * 0.02;

    heroSecond.style.opacity = secondOpacity;
    heroSecond.style.transform = `translateY(${secondY}px) scale(${secondScale})`;

    let appProgress = Math.max((progress - 0.84) / 0.14, 0);
    if(appProgress > 1) appProgress = 1;

    const lockProgress = Math.min(Math.max(appProgress, 0), 1);
    
    const lockRotation = -42 + (42 * lockProgress);
    const lockShiftX = -2.2 + (2.2 * lockProgress);
    
    lockShackleGroup.style.transform =
      `translateX(${lockShiftX}px) rotate(${lockRotation}deg)`;

    app.style.opacity = appProgress;
    app.style.transform = `translateY(${120 - appProgress * 120}px) scale(${0.96 + appProgress * 0.04})`;
    
    const isInteractive = appProgress > 0.98;
    app.style.pointerEvents = isInteractive ? "auto" : "none";
    imgDrop.style.pointerEvents = isInteractive ? "auto" : "none";
    compressBtn.style.pointerEvents = isInteractive ? "auto" : "none";
  }

  ["dragenter", "dragover", "dragleave", "drop"].forEach(eventName => {
    document.addEventListener(eventName, ev => {
      ev.preventDefault();
      ev.stopPropagation();
    });
  });

  ["dragenter", "dragover"].forEach(eventName => {
    imgDrop.addEventListener(eventName, () => imgDrop.classList.add("active"));
  });

  ["dragleave", "drop"].forEach(eventName => {
    imgDrop.addEventListener(eventName, () => imgDrop.classList.remove("active"));
  });

  imgDrop.addEventListener("click", () => imgInput.click());
  imgInput.addEventListener("change", e => setFiles(e.target.files));
  imgDrop.addEventListener("drop", e => setFiles(e.dataTransfer.files));

  compressBtn.addEventListener("click", async () => {
    const previewItems = [];

    if(files.length === 0){
      status.textContent = "Nejdřív vyberte alespoň jeden obrázek.";
      return;
    }

    if(selectedQuality === null){
      status.textContent = "Nejdřív vyberte úroveň komprese.";
      return;
    }

    compressBtn.disabled = true;
    compressBtn.textContent = "Probíhá komprese...";
    status.textContent = `Komprese probíhá... 0 z ${files.length}`;

  try{
    const zip = new JSZip();
    let done = 0;
    const qualityRatio = selectedQuality;

    for(const file of files){
      const compressedBlob = await compressImageFile(file, qualityRatio);
      const outputName = file.name.replace(/\.[^.]+$/, "") + "_compressed.jpg";
      zip.file(outputName, compressedBlob);

      done++;
      status.textContent = `Komprese probíhá... ${done} z ${files.length}`;

      if (previewItems.length < 5) {
        const savedPercent = Math.max(0, Math.round((1 - compressedBlob.size / file.size) * 100));

        previewItems.push({
          src: URL.createObjectURL(compressedBlob),
          name: outputName,
          info: `${formatKB(file.size)} → ${formatKB(compressedBlob.size)} • -${savedPercent}%`
        });
      }
    }

    renderPreviewCards(previewItems);

    status.textContent = "Balení ZIP souboru...";

    const zipBlob = await zip.generateAsync({ type: "blob" });
    downloadBlob(zipBlob, "bkcompress-images.zip");

    status.textContent = `Hotovo. ZIP obsahuje ${files.length} komprimovaných obrázků.`;
  } catch(error){
    console.error(error);
    status.textContent = "Při kompresi došlo k chybě.";
  } finally {
    compressBtn.disabled = false;
    compressBtn.textContent = "Komprimovat a stáhnout ZIP";
  }
  });

  window.addEventListener("scroll", updateStoryScroll, { passive:true });
  window.addEventListener("resize", updateStoryScroll);
  updateStoryScroll();
</script>
</body>
</html>
