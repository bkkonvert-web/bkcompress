<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>BK Compress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg-dark:#050816;
  --bg-blue:#1e3a8a;
  --bg-purple:#2b164f;
  --glass:rgba(15,23,42,.82);
  --border:rgba(255,255,255,.12);
  --text:#e5e7eb;
  --muted:#9aa4c0;
  --accent:#38bdf8;
  --accent2:#818cf8;
}

/* RESET */
*{box-sizing:border-box}
html,body{margin:0;padding:0}

/* ===== BACKGROUND ===== */
body{
  width:100vw;
  height:100vh;
  font-family:system-ui;
  color:var(--text);
  background:
    radial-gradient(1200px at var(--bx,10%) var(--by,10%), var(--bg-blue), transparent),
    radial-gradient(1500px at calc(100% - var(--bx,20%)) calc(100% - var(--by,50%)), var(--bg-purple), transparent),
    linear-gradient(180deg,var(--bg-dark),#020617);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  transition:background-position .10s ease;
}

/* ===== INTRO BLACK ===== */
.intro{
  position:fixed;
  inset:0;
  background:var(--bg-dark);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
  animation:introOut 1.0s ease forwards;
  animation-delay:1.0s;
}
@keyframes introOut{
  to{opacity:0;pointer-events:none}
}
.intro .logo{
  animation:pulse 1.1s infinite ease-in-out;
}
@keyframes pulse{
  0%{opacity:.4;transform:scale(1)}
  50%{opacity:1;transform:scale(1.08)}
  100%{opacity:.4;transform:scale(1)}
}

/* ===== OHRANICENI===== */
.app{
  width:920px;
  max-width:94vw;
  background:var(--glass);
  backdrop-filter:blur(22px);
  border:1px solid var(--border);
  border-radius:48px;
  padding:44px;
  box-shadow:0 60px 160px rgba(0,0,0,.7);
  animation:appIn .8s ease;
  
  /* TADY TO PŘIDÁTE: */
  user-select: none;
  -webkit-user-select: none;
}

/* ===== BK LOGO ===== */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{
  display:flex;
  align-items:center;
  gap:14px;
  font-size:28px;
  font-weight:800;
}
.logo svg{
  width:36px;
  height:36px;
}
.badge{
  padding:12px 26px;
  border-radius:999px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#020617;
  font-weight:900;
}


/* ===== DROP ZONE ===== */
.drop{
  margin-top:40px;
  padding:90px;
  border-radius:40px;
  border:2px dashed var(--border);
  text-align:center;
  font-size:18px;
  cursor:pointer;
  transition:.25s;
}
.drop:hover{
  border-color:var(--accent);
  transform:scale(1.015);
}


/* ===== THUMBNAILS ===== */
.thumbs{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  margin:32px 0;
}
.thumbs img{
  width:96px;
  height:96px;
  object-fit:cover;
  border-radius:24px;
  border:1px solid var(--border);
  animation:thumbIn .4s ease;
  transition:.25s;
}
@keyframes thumbIn{
  from{opacity:0;transform:scale(.9)}
  to{opacity:1;transform:none}
}
.thumbs img:hover{
  transform:scale(1.08);
}


/* ===== CONTROLS ===== */
.controls{
  display:grid;
  grid-template-columns:1fr 1.4fr;
  gap:20px;
}
select{
  padding:20px;
  border-radius:24px;
  background:#020617;
  color:var(--text);
  border:1px solid var(--border);
  font-size:16px;
}
button{
  padding:22px;
  border-radius:28px;
  border:none;
  font-size:20px;
  font-weight:811:48 01.02.202600;
  cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#020617;
  transition:.2s;
}
button:hover{
  transform:translateY(-3px) scale(1.02);
}

/* ===== FOOTER ===== */
.footer{
  position:fixed;
  right:18px;
  bottom:16px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<!-- BK COMPRESS INTRO -->
<div class="intro">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M4 8h11l-3-3" stroke="#38bdf8" stroke-width="2"/>
      <path d="M20 16H9l3 3" stroke="#818cf8" stroke-width="2"/>
    </svg>
    BK Compress
  </div>
</div>

<div class="app" id="app">

<header>
  <div>
    <div class="logo">
 <svg viewBox="0 0 24 24" fill="none">
      <path d="M4 8h11l-3-3" stroke="#38bdf8" stroke-width="2"/>
      <path d="M20 16H9l3 3" stroke="#818cf8" stroke-width="2"/>
    </svg>
	BK Compress</div>
   	<div class="desc">Rychlá a jednoduchá komprese obrázků přímo v prohlížeči.</div>
  </div>
  <div class="badge">IMAGES</div>
</header>

<div class="drop" id="drop">
  Klikni nebo přetáhni obrázky
</div>
<input type="file" id="input" accept="image/*" multiple hidden>

<div class="thumbs" id="thumbs"></div>

<div class="controls">
    <div style="display: flex; align-items: center; gap: 15px; font-size: 20px; font-weight: bold;">
        <label>Kvalita: <strong><span id="qVal">60</span>%</strong></label>
        <input type="range" id="quality" min="10" max="80" value="60">
    </div>
    <button id="compress">Komprimovat</button>
</div>

<div class="results" id="results"></div>

</div>

<div class="footer">Powered by Nevermind web</div>

<script>

/* ===== BACKGROUND ODRAZ ===== */
document.addEventListener("mousemove",e=>{
  const x=(e.clientX/window.innerWidth)*15;
  const y=(e.clientY/window.innerHeight)*15;
  document.body.style.setProperty("--bx",x+"%");
  document.body.style.setProperty("--by",y+"%");
});




/* PREVENT DEFAULT DROP */
["dragenter", "dragover", "dragleave", "drop"].forEach(eventName => {
  document.addEventListener(eventName, e => {
    e.preventDefault();
    e.stopPropagation();
  }, false);
});


/* ===== IMAGE INPUT ===== */
const drop = document.getElementById("drop");
const input = document.getElementById("input");
const quality = document.getElementById("quality");
const qVal = document.getElementById("qVal");
const results = document.getElementById("results");

let files = [];

qVal.textContent = quality.value;
quality.oninput = () => qVal.textContent = quality.value;

/* CLICK SELECT */
drop.onclick = () => input.click();

/* FILE SELECT */
input.onchange = e => {
  files = [...e.target.files];
  showPreviews();
};

/* DROP FILES */
drop.ondrop = e => {
  e.preventDefault(); // Zásadní oprava: zastaví otevření souboru prohlížečem
  e.stopPropagation();
  
  if (e.dataTransfer.files.length > 0) {
    files = [...e.dataTransfer.files];
    showPreviews();
  }
};

/* PREVIEW */
function showPreviews(){
  results.innerHTML = "";
  files.forEach(file=>{
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    img.style.width = "150px";
    img.style.borderRadius = "18px";
    results.appendChild(img);
  });
}

/* COMPRESS */
compress.onclick = () => {
  results.innerHTML = ""; // Vyčistí předchozí výsledky
  
  if (files.length === 0) return alert("Nejdříve vyberte obrázky!");

  files.forEach(file => {
    const img = new Image();
    img.src = URL.createObjectURL(file);
    const originalSize = file.size;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      // Získáme hodnotu z posuvníku (např. 60) a převedeme na formát 0.6 pro prohlížeč
      const currentQuality = quality.value; 
      const data = canvas.toDataURL("image/jpeg", currentQuality / 100);

      // Výpočet výsledné velikosti v bajtech
      const newSize = Math.round((data.split(',')[1].length * 3) / 4);

      const div = document.createElement("div");
      div.className = "result";
      div.style.marginBottom = "20px";
      
      // Sestavení HTML s informacemi o kvalitě a velikosti
      div.innerHTML = `
        <img src="${data}" style="width:150px; border-radius:18px; display:block;">
        <div style="font-size: 13px; margin-top: 8px; color: var(--muted); font-family: sans-serif;">
           ${Math.round(originalSize / 1024)} KB → <strong>${Math.round(newSize / 1024)} KB</strong>
        </div>
      `;
      results.appendChild(div);

      // Spuštění automatického stažení
      const a = document.createElement("a");
      a.href = data;
      a.download = file.name.replace(/\.[^/.]+$/, "") + "_q" + currentQuality + ".jpg";
      a.click();
    };
  });
};
</script>

</body>
</html>
